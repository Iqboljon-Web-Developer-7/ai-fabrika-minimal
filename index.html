<script>
(function(){
  var KEY = 'aifab_offer_deadline', DURATION = 2*60*1000;
  var dl = parseInt(localStorage.getItem(KEY) || '0', 10);
  var left = dl - Date.now();
  if (!dl || left <= 0 || left > DURATION){
    dl = Date.now() + DURATION;
    try { localStorage.setItem(KEY, String(dl)); } catch(e){}
  }
  var p = function(n){ return String(Math.max(0,n)).padStart(2,'0'); };
  function tick(){
    var diff = dl - Date.now();
    if (diff <= 0){
      dl = Date.now() + DURATION;
      try { localStorage.setItem(KEY, String(dl)); } catch(e){}
      diff = dl - Date.now();

    var s = Math.floor(diff/1000);
    var v = { mm: p(Math.floor(s/60)), ss: p(s%60) };
    document.querySelectorAll('[data-cd]').forEach(function(el){ el.textContent = v[el.dataset.cd]; });
  }
  tick(); setInterval(tick, 1000);
})();
